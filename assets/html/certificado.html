<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificado</title>

    <!-- ⚠️ RUTAS RELATIVAS -->
    <link rel="stylesheet" href="../css/certificado.css" />
    <link rel="stylesheet" href="/assets/css/header.css" />

    <!-- FUENTES -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <div class="container header-content">
        <img src="./assets/images/logo-claro-rojo.png" class="logo" />

        <nav class="nav">
          <a href="../../index.html" class="nav-link active">Inicio</a>
          <a href="./assets/html/trivia.html" class="nav-link">Aprende</a>
          <a href="./assets/html/eventos.html" class="nav-link">Eventos</a>
        </nav>

        <!-- Botón hamburguesa -->
        <div class="menu-toggle" id="menuToggle">☰</div>
      </div>
    </header>
    <main class="main">
      <div id="certificado" class="diploma">
        <div class="diploma-inner">
          <div class="trophy"></div>

          <p class="top">Certificado de Reconocimiento</p>

          <h1>Claro por la Inclusión</h1>

          <h2 id="certNombre"></h2>

          <p class="text">
            Ha completado satisfactoriamente la trivia de inclusión.
          </p>

          <p class="score">Puntaje: <span id="certPuntaje"></span></p>

          <p>Tiempo: <span id="certTiempo"></span> segundos</p>

          <div class="acciones">
            <button id="downloadBtn" class="btn btn-primary">
              Descargar PDF
            </button>

            <button onclick="reintentar()" class="btn btn-outline">
              Mejorar puntaje
            </button>

            <button onclick="cerrarSesion()" class="btn btn-secondary">
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </main>
    <div id="giftOverlay" class="hidden"></div>
    <div id="certificado"></div>
    <div id="companion"></div>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="../js/certificado.js"></script>
  </body>
</html>
