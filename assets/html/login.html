<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/footer.css" />
    <!-- Primero estilos globales -->
    <link rel="stylesheet" href="../css/styles.css" />
    <!-- Luego estilos del login -->
    <link rel="stylesheet" href="../css/login.css" />

    <title>Claro</title>
  </head>

  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <a href="../../index.html" class="logo">
            <img
              class="logoclaro"
              src="../images/logo-claro-rojo.png"
              alt="Claro"
            />
          </a>

          <nav>
            <ul>
              <li><a href="../../index.html">Inicio</a></li>
              <li><a href="trivia.html">Trivia</a></li>
              <li><a href="eventos.html">Eventos</a></li>
              <li><a href="login.html" class="active">Registrarse</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <div class="login-container" id="container">
        <!-- Registro -->
        <div class="form-container sign-up">
          <form>
            <h1>Crear cuenta</h1>

            <div class="social-icons">
              <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
              <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#"><i class="fa-brands fa-github"></i></a>
              <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>

            <span>o usa tu correo</span>

            <input type="text" id="registerName" placeholder="Nombre" />
            <input type="email" id="registerEmail" placeholder="Correo" />
            <input
              type="password"
              id="registerPassword"
              placeholder="Contraseña"
            />

            <button id="registerButton">Registrarse</button>
          </form>
        </div>

        <!-- Login -->
        <div class="form-container sign-in">
          <form>
            <h1>Iniciar sesión</h1>

            <div class="social-icons">
              <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
              <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#"><i class="fa-brands fa-github"></i></a>
              <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>

            <span>o usa tu cuenta</span>

            <input type="email" id="loginEmail" placeholder="Correo" />
            <input
              type="password"
              id="loginPassword"
              placeholder="Contraseña"
            />

            <button id="loginButton">Entrar</button>
          </form>
        </div>

        <!-- Panel lateral -->
        <div class="toggle-container">
          <div class="toggle">
            <div class="toggle-panel toggle-left">
              <h1>Bienvenido</h1>
              <p>Ingresa tus datos</p>
              <button class="hidden" id="login">Iniciar sesión</button>
            </div>

            <div class="toggle-panel toggle-right">
              <h1>Hola 👋</h1>
              <p>Crea tu cuenta</p>
              <button class="hidden" id="register">Registrarse</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-content">
        <div class="footer-logo-section">
          <img
            src="./assets/images/logo-claro-rojo.png"
            alt="Logo del colectivo Código Rosa"
            class="logo-footer"
          />
        </div>
        <div class="footer-text-section">
          <p>&copy; 2026 Claro. Todos los derechos reservados.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
