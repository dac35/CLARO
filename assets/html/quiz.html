<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/quiz.css" />

    <title>Quiz DEI</title>
  </head>

  <body>
    <!-- START -->
    <div class="start-screen" id="startScreen">
      <div class="start-card">
        <h2>Antes de comenzar</h2>

        <input type="text" id="nameInput" placeholder="Tu nombre" />
        <input type="email" id="emailInput" placeholder="Tu correo" />

        <button id="startBtn">Comenzar Quiz</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div class="quiz-container" id="quizContainer" style="display: none">
      <audio id="correctSound" src="../sounds/correct.mp3"></audio>
      <audio id="wrongSound" src="../sounds/wrong.mp3"></audio>

      <div class="timer-container">
        <div id="timeBar"></div>
      </div>

      <div class="quiz-header">
        <h1>Quiz DEI</h1>

        <div class="stats">
          <span id="timer">⏱ 10</span>
          <span id="score">⭐ 0</span>
        </div>
      </div>

      <div class="card">
        <p>Pregunta <span id="current">1</span> / <span id="total">10</span></p>

        <h2 id="question"></h2>

        <div id="options" class="options"></div>
      </div>
    </div>

    <script type="module" src="../js/quiz.js"></script>
  </body>
</html>
