<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="../js/quiz.js"></script>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/quiz.css" />
    <link rel="stylesheet" href="/assets/css/eventos.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <title>Claro</title>
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <img src="../images/logo-claro-rojo.png" class="logo" />

        <nav>
          <a href="../../index.html">Inicio</a>
          <a href="trivia.html">Aprende</a>
          <a href="eventos.html" class="active">Eventos</a>
        </nav>
      </div>
    </header>
    <div class="card">
      <div class="card-header">
        <div class="logo">
          <span class="circle">Claro</span>
          <p>Claro por la Inclusión</p>
        </div>
        <button class="btn-top">Comenzar</button>
      </div>

      <div class="progress-section">
        <p class="pregunta">
          Pregunta <span id="current">1</span> / <span id="total">10</span>
        </p>

        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>

        <div class="info-extra">
          <span class="pts" id="points">0 pts</span>
          <span class="timer">⏱ <span id="time">15</span>s</span>
        </div>
      </div>

      <h2 class="question" id="question">Aquí va la pregunta...</h2>

      <img src="" alt="imagen pregunta" class="image" id="image" />

      <div class="options" id="options"></div>

      <p id="feedback" class="feedback"></p>

      <button class="btn-continue" id="nextBtn" disabled>Continuar →</button>
    </div>
  </body>
</html>
