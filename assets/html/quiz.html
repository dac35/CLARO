<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/quiz.css" />

    <title>Quiz DEI</title>
  </head>

  <body>
     <header class="header">
      <div class="container header-content">
        <img src="../images/logo-claro-rojo.png" class="logo" />

        <nav class="nav">
          <a href="../../index.html" class="nav-link active">Inicio</a>
          <a href="trivia.html" class="nav-link">Aprende</a>
          <a href="eventos.html" class="nav-link">Eventos</a>
        </nav>

        <!-- Botón hamburguesa -->
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </label>
      </div>
    <!-- START -->
    <div class="start-screen" id="startScreen">
      <div class="start-card">
        <h2>Antes de comenzar</h2>

        <input type="text" id="nameInput" placeholder="Tu nombre" />
        <input type="email" id="emailInput" placeholder="Tu correo" />

        <button id="startBtn">Comenzar Quiz</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div class="quiz-container" id="quizContainer" style="display: none">
      <audio id="correctSound" src="../sounds/correct.mp3"></audio>
      <audio id="wrongSound" src="../sounds/wrong.mp3"></audio>

      <div class="timer-container">
        <div id="timeBar"></div>
      </div>

      <div class="quiz-header">
        <h1>Quiz DEI</h1>

        <div class="stats">
          <span id="timer">⏱ 10</span>
          <span id="score">⭐ 0</span>
        </div>
      </div>

      <div class="card">
        <p>Pregunta <span id="current">1</span> / <span id="total">10</span></p>

        <h2 id="question"></h2>

        <div id="options" class="options"></div>
        <button id="nextBtn" disabled>Continuar →</button>
      </div>
    </div>
<script type="module" src="./assets/js/ranking.js"></script>
  </body>
</html>
